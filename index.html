<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icons/favicon.png" />
    <title>Daily Dish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            colors: {
              brand: {
                50: "#fffbeb",
                100: "#fef3c7",
                500: "#f59e0b",
                600: "#d97706",
                700: "#b45309",
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body
    class="bg-slate-50/60 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen font-sans antialiased flex flex-col relative transition-colors duration-300 pt-24"
  >
    <div
      class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-amber-200/15 dark:bg-amber-500/5 blur-[120px] pointer-events-none -z-10 transition-colors duration-300"
    ></div>
    <div
      class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-orange-200/10 dark:bg-orange-500/5 blur-[120px] pointer-events-none -z-10 transition-colors duration-300"
    ></div>

    <header
      class="main-header fixed top-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-[1400px] z-40 glass-panel border border-white/40 dark:border-slate-800/60 rounded-full px-4 py-3 flex items-center justify-between shadow-lg shadow-slate-200/20 dark:shadow-black/20 transition-all duration-300"
    >
      <div
        class="logo font-sans text-lg md:text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100 cursor-pointer flex items-center gap-2 select-none active:scale-95 transition-transform duration-200"
        onclick="window.location.reload()"
      >
        <span
          class="w-8 h-8 rounded-full bg-gradient-to-tr from-amber-500 to-orange-600 flex items-center justify-center text-white text-sm"
          ><i class="fa-solid fa-utensils"></i
        ></span>
        <span class="hidden sm:block"
          >DAILY<span class="text-amber-500 font-light">DISH</span></span
        >
      </div>

      <div
        class="search-bar-container relative flex items-center max-w-lg w-full mx-4 shadow-inner rounded-full bg-slate-100/50 dark:bg-slate-900/50 border border-slate-200/80 dark:border-slate-800 focus-within:ring-2 focus-within:ring-amber-500/30 focus-within:bg-white dark:focus-within:bg-slate-900 transition-all duration-300"
      >
        <div class="absolute left-4 text-slate-400">
          <i class="fa-solid fa-magnifying-glass text-sm"></i>
        </div>
        <input
          type="text"
          id="searchInput"
          placeholder="Search recipes..."
          class="w-full pl-10 pr-24 py-2.5 bg-transparent rounded-full focus:outline-none text-slate-850 dark:text-slate-100 text-sm placeholder-slate-400"
        />
        <button
          id="searchBtn"
          class="absolute right-1 top-1 bottom-1 px-4 bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold rounded-full shadow-md transition-all duration-200 active:scale-95 flex items-center justify-center"
        >
          Search
        </button>
      </div>

      <button
        id="theme-toggle"
        class="w-10 h-10 flex shrink-0 items-center justify-center rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50 text-slate-500 dark:text-slate-400 transition-all duration-200 cursor-pointer"
      >
        <i class="fa-solid fa-moon text-base"></i>
      </button>
    </header>

    <main
      class="app-container max-w-[1400px] mx-auto w-full flex-grow relative px-4 md:px-6 py-6 mt-4"
    >
      <div class="w-full grid grid-cols-1 md:grid-cols-4 gap-6 items-start">
        <aside
          id="desktop-sidebar"
          class="hidden md:flex flex-col col-span-1 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200/50 dark:border-slate-800/80 p-5 sticky top-28 shadow-sm"
        >
          <div
            class="relative flex p-1 bg-slate-150/50 dark:bg-slate-950 rounded-2xl mb-6"
          >
            <button
              id="tab-categories"
              class="flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all cursor-pointer bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 shadow-sm border-none outline-none"
            >
              Categories
            </button>
            <button
              id="tab-cuisines"
              class="flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all cursor-pointer text-slate-400 dark:text-slate-555 hover:text-slate-600 dark:hover:text-slate-400 border-none outline-none"
            >
              Cuisines
            </button>
          </div>
          <div id="sidebar-list" class="flex flex-col gap-6 pr-1"></div>
        </aside>

        <div class="col-span-1 md:col-span-3 w-full flex flex-col gap-6">
          <div
            id="grid-header"
            class="flex flex-col sm:flex-row items-center justify-between gap-4 w-full border-b border-slate-200/40 dark:border-slate-800/60 pb-4"
          >
            <div class="text-center sm:text-left">
              <div id="recomText">
                <h2
                  class="text-xl md:text-2xl font-serif font-bold text-slate-800 dark:text-slate-200"
                >
                  Discover <span class="text-amber-500">Delicious</span>
                </h2>
              </div>
              <div id="searchText"></div>
            </div>
            <div
              id="pagination-container"
              class="flex items-center justify-center sm:justify-end gap-2 shrink-0"
            ></div>
          </div>

          <div
            id="recipe-container"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 justify-items-center w-full"
          ></div>
        </div>
      </div>
    </main>

    <button
      id="mobile-filter-trigger"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 md:hidden z-40 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-semibold px-6 py-3 rounded-full shadow-lg shadow-amber-500/20 active:scale-95 transition-all flex items-center gap-2 cursor-pointer border-none outline-none"
    >
      <i class="fa-solid fa-sliders"></i>
      <span>Filters</span>
    </button>

    <div
      id="mobile-filter-backdrop"
      class="fixed inset-0 bg-slate-950/40 dark:bg-slate-950/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300"
    >
      <div
        id="mobile-filter-sheet"
        class="absolute bottom-0 left-0 right-0 bg-white dark:bg-slate-900 rounded-t-[2.5rem] p-6 max-h-[80vh] flex flex-col shadow-2xl border-t border-slate-100 dark:border-slate-800/80 transition-transform duration-300 bottom-sheet-inactive"
      >
        <div class="flex items-center justify-between mb-5">
          <h3
            class="font-serif font-bold text-lg text-slate-800 dark:text-slate-200"
          >
            Filters
          </h3>
          <button
            id="close-mobile-filters"
            class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 cursor-pointer border-none outline-none"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div
          class="relative flex p-1 bg-slate-150/50 dark:bg-slate-950 rounded-2xl mb-5"
        >
          <button
            id="mobile-tab-categories"
            class="flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 shadow-sm border-none outline-none"
          >
            Categories
          </button>
          <button
            id="mobile-tab-cuisines"
            class="flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all text-slate-400 dark:text-slate-500 border-none outline-none"
          >
            Cuisines
          </button>
        </div>
        <div
          id="mobile-sidebar-list"
          class="flex flex-col gap-5 overflow-y-auto pr-1 pb-6 scrollbar-none"
        ></div>
      </div>
    </div>

    <footer
      class="w-full bg-white/50 dark:bg-slate-950/50 backdrop-blur-md border-t border-slate-200/60 dark:border-slate-900 py-6 mt-auto shrink-0 transition-colors duration-300"
    >
      <div
        class="max-w-[1400px] mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <div
          class="font-sans text-base font-bold tracking-tight text-slate-800 dark:text-slate-100 flex items-center gap-2"
        >
          <span
            class="w-5 h-5 rounded bg-amber-500 flex items-center justify-center text-white text-[10px]"
            ><i class="fa-solid fa-utensils"></i
          ></span>
          <span>DAILY<span class="text-amber-500 font-light">DISH</span></span>
        </div>
        <p class="text-xs text-slate-400 font-medium">
          &copy; 2026 Daily Dish. Crafted for food lovers.
        </p>
        <div class="flex items-center gap-4 text-slate-400 text-lg">
          <a
            href="https://github.com/manu-gitxen/Recipe-Finder"
            class="hover:text-amber-500 transition-colors"
            ><i class="fa-brands fa-github"></i
          ></a>
        </div>
      </div>
    </footer>

    <div
      id="recipe-modal"
      class="modal fixed inset-0 z-50 hidden flex items-center justify-center p-2 md:p-4 bg-slate-900/40 dark:bg-slate-950/60 backdrop-blur-md transition-all duration-300"
    >
      <div
        class="modal-content relative bg-white dark:bg-slate-900 rounded-[2rem] max-w-5xl w-full shadow-2xl overflow-hidden border border-white/20 dark:border-slate-800 transform scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[92vh]"
      >
        <button
          class="close-btn absolute top-5 right-5 bg-black/20 hover:bg-black/40 backdrop-blur-md text-white p-2 rounded-full shadow-lg transition-all duration-300 z-20 w-10 h-10 flex items-center justify-center"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
        <div
          id="recipe-details-content"
          class="w-full h-full flex flex-col md:flex-row overflow-y-auto md:overflow-hidden scrollbar-none"
        ></div>
      </div>
    </div>

    <script src="assets/script/script.js"></script>
  </body>
</html>
